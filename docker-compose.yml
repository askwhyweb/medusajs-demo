services:
  postgres:
    image: postgres:16-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medusa}
      POSTGRES_DB: ${POSTGRES_DB:-medusa_demo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: medusa_backend
    restart: unless-stopped
    environment:
      PORT: 9000
      DATABASE_URL: ${DATABASE_URL:-postgres://medusa:medusa@postgres:5432/medusa_demo}
      DB_NAME: ${DB_NAME:-medusa_demo}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORE_CORS: ${STORE_CORS:-http://localhost:8000,http://127.0.0.1:8000}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:9000,http://127.0.0.1:9000}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:8000,http://127.0.0.1:8000,http://localhost:9000,http://127.0.0.1:9000}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@medusa.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-MedusaDemo123!}
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:-http://localhost:9000}
      MEDUSA_STOREFRONT_URL: ${MEDUSA_STOREFRONT_URL:-http://localhost:8000}
      MEDUSA_INTERNAL_BACKEND_URL: ${MEDUSA_INTERNAL_BACKEND_URL:-http://backend:9000}
      MEDUSA_INTERNAL_STOREFRONT_URL: ${MEDUSA_INTERNAL_STOREFRONT_URL:-http://storefront:8000}
      WORKER_MODE: ${WORKER_MODE:-shared}
      RUNTIME_DIR: /runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"
    volumes:
      - runtime-data:/runtime
    command: ["node", "/srv/scripts/backend-start.mjs"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:9000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    container_name: medusa_storefront
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://localhost:9000}
      NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-pk}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-}
      MEDUSA_BACKEND_URL: ${MEDUSA_INTERNAL_BACKEND_URL:-http://backend:9000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - runtime-data:/runtime:ro
    command: ["node", "/srv/scripts/storefront-start.mjs"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  postgres-data:
  redis-data:
  runtime-data:
